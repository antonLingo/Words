<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Русский пазл слов и предложений</title>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 24px;
      background: #f4f6f8;
      color: #111827;
    }

    .app {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      padding: 24px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 28px;
      margin-top: 0;
      margin-bottom: 10px;
    }

    .status {
      margin-bottom: 16px;
      color: #4b5563;
      line-height: 1.5;
    }

    .inputBox {
      min-height: 70px;
      padding: 16px;
      border: 2px solid #d1d5db;
      border-radius: 16px;
      font-size: 30px;
      margin-bottom: 18px;
      background: #fafafa;
      line-height: 1.5;
      word-break: break-word;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 22px;
      cursor: pointer;
      background: #2563eb;
      color: white;
    }

    button.secondary {
      background: #6b7280;
    }

    button.active {
      background: #111827;
    }

    button.wordEnd {
      background: #16a34a;
    }

    .spaceButton {
      min-width: 120px;
      background: #0f766e;
    }

    .card {
      margin-top: 16px;
      padding: 14px;
      border-radius: 14px;
      background: #f9fafb;
      color: #374151;
      line-height: 1.5;
    }

    .small {
      font-size: 14px;
      color: #6b7280;
    }
  </style>
</head>

<body>
  <div class="app">

    <h1>Русский пазл слов и предложений</h1>

    <div id="status" class="status">
      Загружаю словарь...
    </div>

    <div class="buttons">
      <button
        id="dictionaryModeBtn"
        class="active"
        onclick="setMode('dictionary')"
      >
        По словарю
      </button>

      <button
        id="rulesModeBtn"
        class="secondary"
        onclick="setMode('rules')"
      >
        Без словаря
      </button>
    </div>

    <div id="currentInput" class="inputBox">—</div>

    <div class="buttons">
      <button
        class="secondary"
        onclick="removeLastLetter()"
      >
        ⌫ Удалить букву
      </button>

      <button
        class="secondary"
        onclick="clearInput()"
      >
        Очистить всё
      </button>

      <button
        class="spaceButton"
        onclick="addSpace()"
      >
        ПРОБЕЛ
      </button>
    </div>

    <h3>Доступные следующие буквы:</h3>

    <div id="letters" class="buttons"></div>

    <div id="wordStatus" class="card"></div>

    <div class="card">
      <b>Примеры возможных слов:</b>
      <div id="examples"></div>
    </div>

    <div class="card small">
      Словарь загружается из твоего GitHub-репозитория.
    </div>

  </div>

  <script>

    // ТВОЙ RAW-ФАЙЛ
    const LOCAL_DICTIONARY_URL =
      "https://raw.githubusercontent.com/antonLingo/Words/0b8400df77208e47ad6a537be53892fed244a769/russian_words_utf8.txt";

    const FALLBACK_WORDS = `
мне
нужно
записаться
к
врачу
боль
голова
живот
температура
кашель
клиника
врач
доктор
таблетка
лекарство
спасибо
пожалуйста
да
нет
дом
машина
работа
магазин
вода
еда
`.trim().split(/\s+/);

    const RUSSIAN_LETTERS =
      "абвгдеежзийклмнопрстуфхцчшщъыьэюя";

    let trie = {};
    let currentInput = "";
    let mode = "dictionary";

    function normalizeWord(word) {
      return String(word)
        .toLowerCase()
        .replace(/ё/g, "е")
        .trim();
    }

    function prepareWords(words) {
      return [...new Set(
        words
          .map(normalizeWord)
          .filter(word => /^[а-я]+$/.test(word))
      )];
    }

    function buildTrie(words) {

      const root = {};

      for (const word of words) {

        let node = root;

        for (const letter of word) {

          if (!node[letter]) {
            node[letter] = {};
          }

          node = node[letter];
        }

        node.isWord = true;
      }

      return root;
    }

    function getCurrentWord() {

      const parts = currentInput.split(" ");

      return normalizeWord(
        parts[parts.length - 1] || ""
      );
    }

    function getNode(word) {

      let node = trie;

      for (const letter of word) {

        if (!node[letter]) {
          return null;
        }

        node = node[letter];
      }

      return node;
    }

    function sortRussianLetters(a, b) {

      return RUSSIAN_LETTERS.indexOf(a)
        - RUSSIAN_LETTERS.indexOf(b);
    }

    function getAvailableLetters() {

      const currentWord = getCurrentWord();

      // Режим без словаря
      if (mode === "rules") {

        return RUSSIAN_LETTERS
          .split("")
          .filter(letter => {

            const candidate =
              currentWord + letter;

            return (
              !candidate.includes("жы") &&
              !candidate.includes("шы") &&
              !candidate.includes("ьь") &&
              !candidate.includes("ъъ")
            );
          });
      }

      // Режим по словарю
      const node = getNode(currentWord);

      if (!node) {
        return [];
      }

      return Object.keys(node)
        .filter(key => key !== "isWord")
        .sort(sortRussianLetters);
    }

    function isCompleteWord(word) {

      const node = getNode(word);

      return Boolean(node && node.isWord);
    }

    function collectExamples(
      node,
      prefix,
      result,
      limit = 12
    ) {

      if (!node || result.length >= limit) {
        return;
      }

      if (node.isWord) {
        result.push(prefix);
      }

      const letters = Object.keys(node)
        .filter(key => key !== "isWord")
        .sort(sortRussianLetters);

      for (const letter of letters) {

        if (result.length >= limit) {
          break;
        }

        collectExamples(
          node[letter],
          prefix + letter,
          result,
          limit
        );
      }
    }

    function getExamples() {

      if (mode === "rules") {

        return [
          "Без словаря реальные слова не проверяются."
        ];
      }

      const currentWord = getCurrentWord();

      const node = getNode(currentWord);

      const result = [];

      collectExamples(
        node,
        currentWord,
        result
      );

      return result;
    }

    function render() {

      document.getElementById(
        "currentInput"
      ).textContent =
        currentInput || "—";

      document.getElementById(
        "dictionaryModeBtn"
      ).className =
        mode === "dictionary"
          ? "active"
          : "secondary";

      document.getElementById(
        "rulesModeBtn"
      ).className =
        mode === "rules"
          ? "active"
          : "secondary";

      const lettersBox =
        document.getElementById("letters");

      lettersBox.innerHTML = "";

      for (const letter of getAvailableLetters()) {

        const button =
          document.createElement("button");

        button.textContent = letter;

        button.onclick = () => {

          currentInput += letter;

          render();
        };

        lettersBox.appendChild(button);
      }

      const currentWord = getCurrentWord();

      document.getElementById(
        "wordStatus"
      ).innerHTML =
        currentWord &&
        isCompleteWord(currentWord)

          ? `
            <button class="wordEnd">
              ✓ Слово найдено:
              ${currentWord}
            </button>
          `

          : "Введите слово или предложение.";

      const examples = getExamples();

      document.getElementById(
        "examples"
      ).textContent =
        examples.length
          ? examples.join(", ")
          : "Нет примеров.";
    }

    function setMode(newMode) {

      mode = newMode;

      render();
    }

    function removeLastLetter() {

      currentInput =
        currentInput.slice(0, -1);

      render();
    }

    function clearInput() {

      currentInput = "";

      render();
    }

    function addSpace() {

      if (
        currentInput &&
        !currentInput.endsWith(" ")
      ) {

        currentInput += " ";
      }

      render();
    }

    async function loadWords() {

      const status =
        document.getElementById("status");

      try {

        status.innerHTML =
          "Загружаю словарь...";

        const response =
          await fetch(LOCAL_DICTIONARY_URL);

        if (!response.ok) {

          throw new Error(
            "Ошибка загрузки словаря"
          );
        }

        const text =
          await response.text();

        const words =
          prepareWords(
            text.split(/\r?\n|\s+/)
          );

        if (words.length < 1000) {

          throw new Error(
            "Слишком мало слов"
          );
        }

        trie = buildTrie(words);

        status.innerHTML = `
          ✅ Словарь загружен:
          <b>
            ${words.length.toLocaleString("ru-RU")}
          </b>
          слов
        `;

        render();

      } catch (error) {

        console.error(error);

        const words =
          prepareWords(FALLBACK_WORDS);

        trie = buildTrie(words);

        status.innerHTML = `
          ⚠️ Словарь не загрузился.<br>
          Используется резервный словарь.
        `;

        render();
      }
    }

    loadWords();

  </script>
</body>
</html>
