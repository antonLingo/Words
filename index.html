<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Русская клавиатура слов</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f8;
      color: #111827;
    }

    .app {
      width: 100%;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: max(8px, env(safe-area-inset-top)) 8px max(8px, env(safe-area-inset-bottom)) 8px;
      gap: 8px;
      overflow: hidden;
    }

    .status {
      font-size: 12px;
      color: #6b7280;
      min-height: 16px;
      text-align: center;
      flex: 0 0 auto;
    }

    .inputBox {
      width: 100%;
      flex: 1 1 auto;
      min-height: 0;
      padding: 14px;
      border: 2px solid #d1d5db;
      border-radius: 16px;
      background: #ffffff;
      font-size: 30px;
      line-height: 1.45;
      word-break: break-word;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
      white-space: pre-wrap;
    }

    .bottomPanel {
      flex: 0 0 auto;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      width: 100%;
    }

    button {
      border: none;
      border-radius: 10px;
      min-height: 42px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      color: white;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
    }

    .controlButton {
      background: #6b7280;
    }

    .keyboard {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .row {
      display: flex;
      justify-content: center;
      gap: 4px;
      width: 100%;
    }

    .key {
      flex: 1;
      height: clamp(38px, 10.5vw, 48px);
      border-radius: 9px;
      font-size: clamp(17px, 5vw, 22px);
      background: #2563eb;
      padding: 0;
    }

    .key.disabled {
      background: #d1d5db;
      color: #6b7280;
    }

    .spaceButton {
      width: 100%;
      height: 46px;
      background: #0f766e;
      border-radius: 12px;
      font-size: 18px;
    }

    @media (max-height: 680px) {
      .status {
        display: none;
      }

      .inputBox {
        font-size: 26px;
        padding: 12px;
      }

      button {
        min-height: 38px;
        font-size: 17px;
      }

      .key {
        height: clamp(34px, 9.5vw, 43px);
      }

      .spaceButton {
        height: 40px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div id="status" class="status">Загрузка словаря...</div>

    <div id="currentInput" class="inputBox">—</div>

    <div class="bottomPanel">
      <div class="controls">
        <button class="controlButton" onclick="removeLastLetter()">Удалить</button>
        <button class="controlButton" onclick="clearInput()">Очистить</button>
      </div>

      <div id="keyboard" class="keyboard"></div>

      <button class="spaceButton" onclick="addSpace()">Пробел</button>
    </div>
  </div>

  <script>
    const LOCAL_DICTIONARY_URL =
      "https://raw.githubusercontent.com/antonLingo/Words/0b8400df77208e47ad6a537be53892fed244a769/russian_words_utf8.txt";

    const FALLBACK_WORDS = `
мне нужно записаться к врачу боль голова живот температура кашель клиника врач доктор таблетка лекарство
спасибо пожалуйста да нет дом машина работа магазин вода еда я ты он она мы вы они где когда как что кто
можно надо хочу могу можете скажите подскажите извините сегодня завтра вчера сейчас помощь проблема вопрос
ответ прием запись страховка карта номер телефон адрес кабинет регистратура анализ кровь давление горло нос ухо
глаз зуб спина грудь сердце рука нога шея кожа дышать дыхание трудно лучше хуже
`.trim().split(/\s+/);

    const KEYBOARD_ROWS = [
      ["й", "ц", "у", "к", "е", "н", "г", "ш", "щ", "з", "х", "ъ"],
      ["ф", "ы", "в", "а", "п", "р", "о", "л", "д", "ж", "э"],
      ["я", "ч", "с", "м", "и", "т", "ь", "б", "ю"]
    ];

    let trie = {};
    let currentInput = "";
    let freeMode = false;
    let lastGrayTapLetter = null;
    let lastGrayTapTime = 0;

    function normalizeWord(word) {
      return String(word)
        .toLowerCase()
        .replace(/ё/g, "е")
        .trim();
    }

    function prepareWords(words) {
      return [...new Set(
        words
          .map(normalizeWord)
          .filter(word => /^[а-я]+$/.test(word))
      )];
    }

    function buildTrie(words) {
      const root = {};

      for (const word of words) {
        let node = root;

        for (const letter of word) {
          if (!node[letter]) node[letter] = {};
          node = node[letter];
        }

        node.isWord = true;
      }

      return root;
    }

    function getCurrentWord() {
      const parts = currentInput.split(" ");
      return normalizeWord(parts[parts.length - 1] || "");
    }

    function getNode(word) {
      let node = trie;

      for (const letter of word) {
        if (!node[letter]) return null;
        node = node[letter];
      }

      return node;
    }

    function getAvailableLetters() {
      if (freeMode) {
        return new Set(KEYBOARD_ROWS.flat());
      }

      const currentWord = getCurrentWord();
      const node = getNode(currentWord);

      if (!node) return new Set();

      return new Set(Object.keys(node).filter(key => key !== "isWord"));
    }

    function scrollTextToBottom() {
      const box = document.getElementById("currentInput");
      box.scrollTop = box.scrollHeight;
    }

    function printLetter(letter) {
      currentInput += letter;
      render();
    }

    function handleGrayLetterTap(letter) {
      const now = Date.now();
      const isDoubleTap = lastGrayTapLetter === letter && now - lastGrayTapTime < 450;

      if (isDoubleTap) {
        freeMode = true;
        printLetter(letter);
        lastGrayTapLetter = null;
        lastGrayTapTime = 0;
        return;
      }

      lastGrayTapLetter = letter;
      lastGrayTapTime = now;
    }

    function render() {
      const inputBox = document.getElementById("currentInput");
      inputBox.textContent = currentInput || "—";

      const availableLetters = getAvailableLetters();
      const keyboard = document.getElementById("keyboard");
      keyboard.innerHTML = "";

      for (const rowLetters of KEYBOARD_ROWS) {
        const row = document.createElement("div");
        row.className = "row";

        for (const letter of rowLetters) {
          const button = document.createElement("button");
          button.textContent = letter;

          if (availableLetters.has(letter)) {
            button.className = "key";
            button.onclick = () => printLetter(letter);
          } else {
            button.className = "key disabled";
            button.onclick = () => handleGrayLetterTap(letter);
          }

          row.appendChild(button);
        }

        keyboard.appendChild(row);
      }

      requestAnimationFrame(scrollTextToBottom);
    }

    function removeLastLetter() {
      currentInput = currentInput.slice(0, -1);
      render();
    }

    function clearInput() {
      currentInput = "";
      freeMode = false;
      lastGrayTapLetter = null;
      lastGrayTapTime = 0;
      render();
    }

    function addSpace() {
      if (currentInput && !currentInput.endsWith(" ")) {
        currentInput += " ";
      }

      freeMode = false;
      lastGrayTapLetter = null;
      lastGrayTapTime = 0;
      render();
    }

    async function loadWords() {
      const status = document.getElementById("status");

      try {
        const response = await fetch(LOCAL_DICTIONARY_URL);

        if (!response.ok) {
          throw new Error("Ошибка загрузки словаря");
        }

        const text = await response.text();
        const words = prepareWords(text.split(/\r?\n|\s+/));

        if (words.length < 1000) {
          throw new Error("Слишком мало слов");
        }

        trie = buildTrie(words);
        status.textContent = "";
        render();
      } catch (error) {
        console.error(error);

        const words = prepareWords(FALLBACK_WORDS);
        trie = buildTrie(words);

        status.textContent = "Словарь не загрузился. Используется резервный.";
        render();
      }
    }

    loadWords();
  </script>
</body>
</html>
