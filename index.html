<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Русская клавиатура слов</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f8;
      color: #111827;
    }

    .app {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 10px;
    }

    .status {
      font-size: 13px;
      color: #6b7280;
      min-height: 18px;
      text-align: center;
    }

    .inputBox {
      width: 100%;
      min-height: 170px;
      padding: 16px;
      border: 2px solid #d1d5db;
      border-radius: 18px;
      background: #ffffff;
      font-size: 32px;
      line-height: 1.45;
      word-break: break-word;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      width: 100%;
    }

    button {
      border: none;
      border-radius: 12px;
      min-height: 48px;
      font-size: 20px;
      font-weight: 600;
      cursor: pointer;
      color: white;
      -webkit-tap-highlight-color: transparent;
    }

    .controlButton {
      background: #6b7280;
    }

    .keyboard {
      width: 100%;
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .row {
      display: flex;
      justify-content: center;
      gap: 6px;
      width: 100%;
    }

    .key {
      flex: 1;
      max-width: 56px;
      height: 52px;
      border-radius: 12px;
      font-size: 22px;
      background: #2563eb;
    }

    .key.disabled {
      background: #d1d5db;
      color: #6b7280;
      cursor: default;
    }

    .spaceRow {
      width: 100%;
      display: flex;
      justify-content: center;
      padding-bottom: 8px;
    }

    .spaceButton {
      width: min(520px, 100%);
      height: 54px;
      background: #0f766e;
      border-radius: 14px;
      font-size: 20px;
    }

    @media (max-width: 430px) {
      .app {
        padding: 8px;
      }

      .inputBox {
        min-height: 150px;
        font-size: 28px;
        padding: 14px;
      }

      .row {
        gap: 4px;
      }

      .key {
        height: 48px;
        font-size: 20px;
        border-radius: 10px;
      }

      button {
        min-height: 46px;
        font-size: 18px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div id="status" class="status">Загрузка словаря...</div>

    <div id="currentInput" class="inputBox">—</div>

    <div class="controls">
      <button class="controlButton" onclick="removeLastLetter()">Удалить</button>
      <button class="controlButton" onclick="clearInput()">Очистить</button>
    </div>

    <div id="keyboard" class="keyboard"></div>

    <div class="spaceRow">
      <button class="spaceButton" onclick="addSpace()">Пробел</button>
    </div>
  </div>

  <script>
    const LOCAL_DICTIONARY_URL =
      "https://raw.githubusercontent.com/antonLingo/Words/0b8400df77208e47ad6a537be53892fed244a769/russian_words_utf8.txt";

    const FALLBACK_WORDS = `
мне нужно записаться к врачу боль голова живот температура кашель клиника врач доктор таблетка лекарство
спасибо пожалуйста да нет дом машина работа магазин вода еда я ты он она мы вы они где когда как что кто
можно надо хочу могу можете скажите подскажите извините сегодня завтра вчера сейчас помощь проблема вопрос
ответ прием запись страховка карта номер телефон адрес кабинет регистратура анализ кровь давление горло нос ухо
глаз зуб спина грудь сердце рука нога шея кожа дышать дыхание трудно лучше хуже
`.trim().split(/\s+/);

    const KEYBOARD_ROWS = [
      ["й", "ц", "у", "к", "е", "н", "г", "ш", "щ", "з", "х", "ъ"],
      ["ф", "ы", "в", "а", "п", "р", "о", "л", "д", "ж", "э"],
      ["я", "ч", "с", "м", "и", "т", "ь", "б", "ю"]
    ];

    let trie = {};
    let currentInput = "";
    let forcedLetter = null;

    function normalizeWord(word) {
      return String(word)
        .toLowerCase()
        .replace(/ё/g, "е")
        .trim();
    }

    function prepareWords(words) {
      return [...new Set(
        words
          .map(normalizeWord)
          .filter(word => /^[а-я]+$/.test(word))
      )];
    }

    function buildTrie(words) {
      const root = {};

      for (const word of words) {
        let node = root;

        for (const letter of word) {
          if (!node[letter]) node[letter] = {};
          node = node[letter];
        }

        node.isWord = true;
      }

      return root;
    }

    function getCurrentWord() {
      const parts = currentInput.split(" ");
      return normalizeWord(parts[parts.length - 1] || "");
    }

    function getNode(word) {
      let node = trie;

      for (const letter of word) {
        if (!node[letter]) return null;
        node = node[letter];
      }

      return node;
    }

    function getAvailableLetters() {
      const currentWord = getCurrentWord();
      const node = getNode(currentWord);

      if (!node) return [];

      return Object.keys(node).filter(key => key !== "isWord");
    }

    function forceLetter(letter) {
      currentInput += letter;
      forcedLetter = letter;
      render();
    }

    function render() {
      document.getElementById("currentInput").textContent = currentInput || "—";

      const availableLetters = new Set(getAvailableLetters());
      const keyboard = document.getElementById("keyboard");
      keyboard.innerHTML = "";

      for (const rowLetters of KEYBOARD_ROWS) {
        const row = document.createElement("div");
        row.className = "row";

        for (const letter of rowLetters) {
          const button = document.createElement("button");
          button.textContent = letter;

          if (availableLetters.has(letter) || forcedLetter === letter) {
            button.className = "key";

            button.onclick = () => {
              currentInput += letter;
              render();
            };
          } else {
            button.className = "key disabled";

            let clickCount = 0;
            let clickTimer = null;

            button.onclick = () => {
              clickCount++;

              clearTimeout(clickTimer);

              clickTimer = setTimeout(() => {
                clickCount = 0;
              }, 350);

              if (clickCount >= 2) {
                forceLetter(letter);
                clickCount = 0;
              }
            };
          }

          row.appendChild(button);
        }

        keyboard.appendChild(row);
      }
    }

    function removeLastLetter() {
      currentInput = currentInput.slice(0, -1);

      forcedLetter = null;

      render();
    }

    function clearInput() {
      currentInput = "";
      forcedLetter = null;
      render();
    }

    function addSpace() {
      if (currentInput && !currentInput.endsWith(" ")) {
        currentInput += " ";
      }

      forcedLetter = null;

      render();
    }

    async function loadWords() {
      const status = document.getElementById("status");

      try {
        const response = await fetch(LOCAL_DICTIONARY_URL);

        if (!response.ok) {
          throw new Error("Ошибка загрузки словаря");
        }

        const text = await response.text();
        const words = prepareWords(text.split(/\r?\n|\s+/));

        if (words.length < 1000) {
          throw new Error("Слишком мало слов");
        }

        trie = buildTrie(words);
        status.textContent = "";
        render();
      } catch (error) {
        console.error(error);

        const words = prepareWords(FALLBACK_WORDS);
        trie = buildTrie(words);

        status.textContent = "Словарь не загрузился. Используется резервный.";
        render();
      }
    }

    loadWords();
  </script>
</body>
</html>
