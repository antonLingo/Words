<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />

  <!-- Скрытие адресной строки на телефонах -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <title>Русская клавиатура</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f3f6fb;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      position: fixed;
      inset: 0;
    }

    .app {
      width: 100vw;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding:
        max(8px, env(safe-area-inset-top))
        8px
        max(8px, env(safe-area-inset-bottom))
        8px;
      overflow: hidden;
    }

    .textBox {
      width: 100%;
      height: 96px;
      min-height: 96px;
      max-height: 96px;
      overflow-y: auto;
      padding: 14px;
      border-radius: 18px;
      background: white;
      border: 1px solid #dbe4ef;
      box-shadow: 0 3px 12px rgba(0,0,0,0.06);
      font-size: 32px;
      line-height: 1.35;
      word-break: break-word;
      white-space: pre-wrap;
      color: #111827;
      flex: 0 0 auto;
    }

    .topButtons {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr 2fr;
      gap: 8px;
      flex: 0 0 auto;
    }

    button {
      border: none;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
      color: white;
      font-weight: 700;
    }

    .actionButton {
      height: 48px;
      border-radius: 14px;
      background: linear-gradient(180deg, #3b82f6 0%, #2563eb 100%);
      box-shadow: 0 2px 8px rgba(37, 99, 235, 0.25);
      font-size: 20px;
    }

    .keyboard {
      flex: 1 1 auto;
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 8px;
      min-height: 0;
    }

    .row {
      width: 100%;
      display: grid;
      gap: 6px;
    }

    /* Алфавит в 3 строки */
    .row1 {
      grid-template-columns: repeat(11, 1fr);
    }

    .row2 {
      grid-template-columns: repeat(11, 1fr);
    }

    .row3 {
      grid-template-columns: repeat(11, 1fr);
    }

    .key {
      width: 100%;
      min-height: 56px;
      border-radius: 14px;
      background: linear-gradient(180deg, #4f93ff 0%, #2563eb 100%);
      box-shadow: 0 2px 8px rgba(37, 99, 235, 0.25);
      font-size: clamp(22px, 3.8vw, 42px);
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .key.disabled {
      background: linear-gradient(180deg, #d7dce4 0%, #c6ccd6 100%);
      color: #5b6472;
      box-shadow: none;
    }

    @media (max-height: 620px) {
      .textBox {
        height: 82px;
        min-height: 82px;
        max-height: 82px;
        font-size: 26px;
      }

      .actionButton {
        height: 42px;
        font-size: 18px;
      }

      .key {
        min-height: 46px;
        border-radius: 10px;
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <div id="textBox" class="textBox">—</div>

    <div class="topButtons">
      <button class="actionButton" onclick="removeLastLetter()">⌫</button>
      <button class="actionButton" onclick="clearInput()">🗑</button>
      <button class="actionButton" onclick="addSpace()">ПРОБЕЛ</button>
    </div>

    <div id="keyboard" class="keyboard"></div>

  </div>

  <script>
    const DICTIONARY_URL =
      "https://raw.githubusercontent.com/antonLingo/Words/0b8400df77208e47ad6a537be53892fed244a769/russian_words_utf8.txt";

    const FALLBACK_WORDS = `
мне нужно записаться к врачу боль голова живот температура кашель клиника врач доктор таблетка лекарство
спасибо пожалуйста да нет дом машина работа магазин вода еда я ты он она мы вы они где когда как что кто
можно надо хочу могу можете скажите подскажите извините сегодня завтра вчера сейчас помощь проблема вопрос
ответ прием запись страховка карта номер телефон адрес кабинет регистратура анализ кровь давление горло нос ухо
глаз зуб спина грудь сердце рука нога шея кожа дышать дыхание трудно лучше хуже
`.trim().split(/\s+/);

    // АЛФАВИТ В 3 СТРОКИ
    const KEYBOARD_ROWS = [
      ["а", "б", "в", "г", "д", "е", "ё", "ж", "з", "и", "й"],
      ["к", "л", "м", "н", "о", "п", "р", "с", "т", "у", "ф"],
      ["х", "ц", "ч", "ш", "щ", "ъ", "ы", "ь", "э", "ю", "я"]
    ];

    let trie = {};
    let currentInput = "";
    let freeMode = false;
    let lastGrayTapLetter = null;
    let lastGrayTapTime = 0;

    function normalizeWord(word) {
      return String(word)
        .toLowerCase()
        .replace(/ё/g, "е")
        .trim();
    }

    function prepareWords(words) {
      return [...new Set(
        words
          .map(normalizeWord)
          .filter(word => /^[а-я]+$/.test(word))
      )];
    }

    function buildTrie(words) {
      const root = {};

      for (const word of words) {
        let node = root;

        for (const letter of word) {
          if (!node[letter]) node[letter] = {};
          node = node[letter];
        }

        node.isWord = true;
      }

      return root;
    }

    function getCurrentWord() {
      const parts = currentInput.split(" ");
      return normalizeWord(parts[parts.length - 1] || "");
    }

    function getNode(word) {
      let node = trie;

      for (const letter of word) {
        if (!node[letter]) return null;
        node = node[letter];
      }

      return node;
    }

    function getAvailableLetters() {
      if (freeMode) {
        return new Set(KEYBOARD_ROWS.flat());
      }

      const currentWord = getCurrentWord();
      const node = getNode(currentWord);

      if (!node) return new Set();

      return new Set(
        Object.keys(node).filter(key => key !== "isWord")
      );
    }

    function render() {
      const textBox = document.getElementById("textBox");
      textBox.textContent = currentInput || "—";

      const availableLetters = getAvailableLetters();
      const keyboard = document.getElementById("keyboard");
      keyboard.innerHTML = "";

      KEYBOARD_ROWS.forEach((rowLetters, rowIndex) => {
        const row = document.createElement("div");
        row.className = `row row${rowIndex + 1}`;

        rowLetters.forEach(letter => {
          const button = document.createElement("button");

          button.textContent = letter.toUpperCase();

          const isAvailable =
            availableLetters.has(letter) ||
            availableLetters.has(normalizeWord(letter));

          button.className = isAvailable
            ? "key"
            : "key disabled";

          if (isAvailable) {
            button.onclick = () => printLetter(letter);
          } else {
            button.onclick = () => handleGrayLetterTap(letter);
          }

          row.appendChild(button);
        });

        keyboard.appendChild(row);
      });

      requestAnimationFrame(() => {
        textBox.scrollTop = textBox.scrollHeight;
      });
    }

    function printLetter(letter) {
      currentInput += letter;
      render();
    }

    function handleGrayLetterTap(letter) {
      const now = Date.now();

      const isDoubleTap =
        lastGrayTapLetter === letter &&
        now - lastGrayTapTime < 450;

      if (isDoubleTap) {
        freeMode = true;
        printLetter(letter);
        lastGrayTapLetter = null;
        lastGrayTapTime = 0;
        return;
      }

      lastGrayTapLetter = letter;
      lastGrayTapTime = now;
    }

    function removeLastLetter() {
      currentInput = currentInput.slice(0, -1);
      render();
    }

    function clearInput() {
      currentInput = "";
      freeMode = false;
      lastGrayTapLetter = null;
      lastGrayTapTime = 0;
      render();
    }

    function addSpace() {
      if (currentInput && !currentInput.endsWith(" ")) {
        currentInput += " ";
      }

      freeMode = false;
      lastGrayTapLetter = null;
      lastGrayTapTime = 0;
      render();
    }

    async function loadWords() {
      try {
        const response = await fetch(DICTIONARY_URL);

        if (!response.ok) {
          throw new Error("dictionary error");
        }

        const text = await response.text();

        const words = prepareWords(
          text.split(/\r?\n|\s+/)
        );

        if (words.length < 1000) {
          throw new Error("small dictionary");
        }

        trie = buildTrie(words);
        render();
      } catch (error) {
        trie = buildTrie(
          prepareWords(FALLBACK_WORDS)
        );

        render();
      }
    }

    // Попытка скрыть адресную строку
    window.addEventListener("load", () => {
      setTimeout(() => {
        window.scrollTo(0, 1);
      }, 100);
    });

    loadWords();
  </script>
</body>
</html>
